<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3E2723"/>
      <stop offset="100%" stop-color="#4E3223"/>
    </linearGradient>
  </defs>

  <!-- Canvas background -->
  <rect width="800" height="500" rx="8" fill="url(#bg2)"/>

  <!-- HUD bar -->
  <rect width="800" height="32" fill="rgba(0,0,0,0.5)"/>
  <text x="14" y="20" font-family="monospace" font-size="16" fill="white">Level 3</text>
  <text x="400" y="20" font-family="monospace" font-size="16" fill="white" text-anchor="middle">0:12.4</text>
  <text x="786" y="20" font-family="monospace" font-size="16" fill="white" text-anchor="end">Score: 2850</text>

  <!-- Maze area (simplified 5x5 representation) -->
  <g transform="translate(200, 80)">
    <!-- Path tiles -->
    <rect x="0" y="0" width="400" height="400" rx="2" fill="#D2B48C"/>

    <!-- Walls (thick brown lines) -->
    <g stroke="#5C3A1E" stroke-width="4" stroke-linecap="round">
      <!-- Outer border -->
      <rect x="0" y="0" width="400" height="400" fill="none"/>
      <!-- Interior walls -->
      <line x1="80" y1="0" x2="80" y2="160"/>
      <line x1="160" y1="80" x2="160" y2="240"/>
      <line x1="240" y1="0" x2="240" y2="80"/>
      <line x1="240" y1="160" x2="240" y2="320"/>
      <line x1="320" y1="80" x2="320" y2="160"/>
      <line x1="320" y1="240" x2="320" y2="400"/>
      <line x1="80" y1="240" x2="160" y2="240"/>
      <line x1="0" y1="320" x2="160" y2="320"/>
      <line x1="240" y1="320" x2="320" y2="320"/>
      <line x1="80" y1="160" x2="240" y2="160"/>
    </g>

    <!-- Start cell highlight -->
    <rect x="1" y="1" width="78" height="78" fill="rgba(255,255,255,0.12)"/>

    <!-- Goal cell glow -->
    <rect x="321" y="321" width="78" height="78" fill="rgba(76,175,80,0.25)"/>
    <circle cx="360" cy="360" r="14" fill="#4CAF50" opacity="0.7"/>

    <!-- Ant -->
    <g transform="translate(200, 120)">
      <ellipse cx="-6" cy="0" rx="10" ry="7" fill="#1A1A1A"/>
      <ellipse cx="6" cy="0" rx="6" ry="5" fill="#1A1A1A"/>
      <ellipse cx="14" cy="0" rx="5" ry="4" fill="#1A1A1A"/>
      <path d="M18 -2 Q24 -10 27 -13" fill="none" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M18 2 Q24 10 27 13" fill="none" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- Trail dots -->
    <circle cx="170" cy="120" r="3" fill="#1A1A1A" opacity="0.15"/>
    <circle cx="150" cy="120" r="2.5" fill="#1A1A1A" opacity="0.1"/>
  </g>

  <!-- Streak indicator -->
  <text x="400" y="488" font-family="monospace" font-size="14" fill="#FF5722" text-anchor="middle" opacity="0.8">\uD83D\uDD25 CLEAN RUN</text>
</svg>
