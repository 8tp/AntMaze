<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3E2723"/>
      <stop offset="50%" stop-color="#5C3A1E"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D2B48C"/>
      <stop offset="100%" stop-color="#A0845C"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" rx="16" fill="url(#bgGrad)"/>

  <!-- Decorative maze grid lines -->
  <g opacity="0.1" stroke="#D2B48C" stroke-width="2">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="720" y1="0" x2="720" y2="400"/>
    <line x1="840" y1="0" x2="840" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/>
    <line x1="1080" y1="0" x2="1080" y2="400"/>
  </g>

  <!-- Partial maze walls (decorative) -->
  <g stroke="#5C3A1E" stroke-width="4" stroke-linecap="round" opacity="0.35">
    <line x1="120" y1="80" x2="120" y2="240"/>
    <line x1="240" y1="0" x2="240" y2="160"/>
    <line x1="360" y1="160" x2="360" y2="320"/>
    <line x1="840" y1="80" x2="840" y2="240"/>
    <line x1="960" y1="160" x2="960" y2="400"/>
    <line x1="1080" y1="0" x2="1080" y2="240"/>
    <line x1="120" y1="240" x2="360" y2="240"/>
    <line x1="840" y1="160" x2="1080" y2="160"/>
  </g>

  <!-- Title text -->
  <text x="600" y="170" font-family="monospace, 'Courier New'" font-size="120" font-weight="bold"
        fill="url(#textGrad)" text-anchor="middle" dominant-baseline="middle"
        letter-spacing="8">ANT MAZE</text>

  <!-- Subtitle -->
  <text x="600" y="240" font-family="monospace, 'Courier New'" font-size="22"
        fill="#4CAF50" text-anchor="middle" opacity="0.9">A perpetual-motion maze game</text>

  <!-- Ant on the left -->
  <g transform="translate(160, 310)">
    <ellipse cx="-10" cy="0" rx="12" ry="9" fill="#1A1A1A"/>
    <ellipse cx="6" cy="-2" rx="7" ry="6" fill="#1A1A1A"/>
    <ellipse cx="17" cy="-4" rx="5.5" ry="5" fill="#1A1A1A"/>
    <path d="M21 -7 Q28 -18 32 -22" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
    <path d="M21 -1 Q28 10 32 14" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
    <line x1="-6" y1="-8" x2="-14" y2="-20" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-6" y1="8" x2="-14" y2="20" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4" y1="-7" x2="0" y2="-19" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4" y1="5" x2="0" y2="17" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Trail dots -->
  <circle cx="120" cy="310" r="3" fill="#1A1A1A" opacity="0.15"/>
  <circle cx="105" cy="310" r="2.5" fill="#1A1A1A" opacity="0.1"/>
  <circle cx="92" cy="310" r="2" fill="#1A1A1A" opacity="0.05"/>

  <!-- Goal marker on the right -->
  <circle cx="1040" cy="310" r="14" fill="#4CAF50" opacity="0.3"/>
  <circle cx="1040" cy="310" r="9" fill="#4CAF50" opacity="0.6"/>

  <!-- Tech badges area -->
  <text x="600" y="360" font-family="monospace" font-size="14" fill="rgba(255,255,255,0.3)"
        text-anchor="middle">TypeScript + Vite + Canvas 2D + Web Audio API</text>
</svg>
